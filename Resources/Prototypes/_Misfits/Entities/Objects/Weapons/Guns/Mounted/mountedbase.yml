# Misfits Add - Ports RMC Mountables and adds the M2929 Browning HMG.
- type: entity
  abstract: true
  id: N14BaseWeaponmount
  name: weapon mount
  description: A rooty tooty mount and shooty.
  components:
  - type: Appearance
  - type: Corrodible
    isCorrodible: false
  - type: Strap
    position: Stand
    buckleSound: /Audio/_RMC14/Weapons/Guns/Reload/hpr_reload.ogg
    unbuckleSound: /Audio/_RMC14/Weapons/Guns/Reload/hpr_unload.ogg
    buckledAlertType: null
    buckleOffset: "0,0.5"
  - type: WeaponMount
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49, 0.05"
        density: 5
        mask:
        - FullTileMask
        layer:
        - BarricadeImpassable
  - type: RMCRepairable
    heal: 40
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: DamageExaminable
  - type: Sprite
    drawdepth: Mobs
    noRot: true
